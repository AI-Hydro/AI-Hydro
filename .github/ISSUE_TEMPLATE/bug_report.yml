name: 🐛 Bug Report
description: Report a bug in AI-Hydro
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill in as much detail as possible so we can reproduce and fix it quickly.

        **Tip:** Bugs in tool results (wrong watershed area, bad streamflow data, etc.) are most useful with the gauge ID and date range that triggered the problem.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of AI-Hydro is affected?
      options:
        - VS Code Extension (UI / chat)
        - MCP Server / Python tools
        - Specific tool (name it in the description)
        - Map panel
        - Session / caching
        - Installation / setup
      default: 0
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: AI-Hydro Version
      description: Check the Settings panel or run `python mcp_server.py --version`
      placeholder: 'e.g., 1.0.0-alpha'
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen instead.
      placeholder: |
        e.g., delineate_watershed("01031500") returned an empty polygon.
        I expected a 769 km² watershed boundary for the Piscataquis River.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: false

  - type: input
    id: gauge-id
    attributes:
      label: Gauge ID (if applicable)
      description: 8-digit USGS NWIS site ID
      placeholder: 'e.g., 01031500'
    validations:
      required: false

  - type: input
    id: provider-model
    attributes:
      label: AI Provider / Model
      description: Which AI model were you using?
      placeholder: 'e.g., anthropic / claude-sonnet-4-6'
    validations:
      required: false

  - type: textarea
    id: system-info
    attributes:
      label: System Information
      placeholder: |
        OS: macOS 15.x / Ubuntu 22.04 / Windows 11
        Python: 3.11.x
        VS Code: 1.95.x
        Key packages: pygeohydro 0.x, torch 2.x
    validations:
      required: false

  - type: textarea
    id: error-output
    attributes:
      label: Error output or logs
      description: Paste any error messages, tracebacks, or MCP server logs here.
      render: shell
    validations:
      required: false
