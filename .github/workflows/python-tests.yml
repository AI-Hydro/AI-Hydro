name: Python Tests

on:
  push:
    branches: [main]
    paths:
      - "python/**"
      - ".github/workflows/python-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "python/**"
      - ".github/workflows/python-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-tests:
    runs-on: ubuntu-latest
    name: Python MCP Server Tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install package with test dependencies
        run: |
          cd python
          pip install -e ".[mcp,dev]"

      - name: Run tests (excluding live/internet tests)
        run: |
          cd python
          pytest tests/ -m "not live" -v --tb=short

      - name: Verify MCP tool registration
        run: |
          cd python
          python setup_mcp.py --check
