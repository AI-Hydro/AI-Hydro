name: Compute Hydrological Signatures
type: workflow
description: Extract CAMELS-like catchment attributes including topography, climate, soil, vegetation, geology, and hydrological signatures
category: attribute_extraction
version: 1.0.0

ai_guidance: |
  This is a FLEXIBLE WORKFLOW BLUEPRINT (not a hardcoded tool). Use this to guide the AI in implementing
  a custom attribute extraction pipeline when:
  - User needs only specific attribute categories
  - User wants to customize computation methods
  - User needs to use non-standard data sources
  - User wants to understand the extraction process step-by-step
  
  If user needs complete standard CAMELS attributes without modifications, consider recommending the hardcoded
  'camels_extraction' TOOL from tier3_tools.json instead.

use_when:
  - User needs specific attribute categories only
  - User wants to customize attribute calculations
  - User needs non-standard attribute definitions
  - User wants flexibility in extraction pipeline
  - User is learning CAMELS attribute extraction

inputs:
  - name: gauge_id
    type: string
    description: USGS gauge identifier
    required: true
  - name: start_date
    type: date
    description: Start date for analysis period
    default: "1989-10-01"
  - name: end_date
    type: date
    description: End date for analysis period
    default: "2009-09-30"
  - name: attribute_groups
    type: array
    description: Attribute groups to compute
    default: ["topography", "climate", "soil", "vegetation", "geology", "hydrology"]
    options:
      - topography
      - climate
      - soil
      - vegetation
      - geology
      - hydrology

outputs:
  - name: catchment_attributes
    type: dataframe
    description: Complete CAMELS-like attribute dataset
  - name: watershed_boundary
    type: geodataframe
    description: Watershed boundary
  - name: attribute_metadata
    type: dict
    description: Metadata for each attribute (units, sources, etc.)

steps:
  - name: delineate_watershed
    description: Delineate watershed boundary
    action: python.ai_hydro.camels.delineate_watershed
    params:
      gauge_id: ${inputs.gauge_id}
  
  - name: topographic_attributes
    description: Extract elevation, slope, drainage area
    action: python.ai_hydro.camels.part1_attributes.extract_topographic_attributes
    params:
      watershed_geom: ${steps.delineate_watershed.output}
    condition: "'topography' in inputs.attribute_groups"
  
  - name: climate_indices
    description: Compute precipitation, PET, aridity, seasonality
    action: python.ai_hydro.camels.part1_attributes.extract_climate_attributes
    params:
      watershed_geom: ${steps.delineate_watershed.output}
      start_date: ${inputs.start_date}
      end_date: ${inputs.end_date}
    condition: "'climate' in inputs.attribute_groups"
  
  - name: soil_characteristics
    description: Extract soil depth, porosity, texture
    action: python.ai_hydro.camels.part1_attributes.extract_soil_attributes
    params:
      watershed_geom: ${steps.delineate_watershed.output}
    condition: "'soil' in inputs.attribute_groups"
  
  - name: vegetation_characteristics
    description: Extract LAI, NDVI, land cover
    action: python.ai_hydro.camels.part1_attributes.extract_vegetation_attributes
    params:
      watershed_geom: ${steps.delineate_watershed.output}
      gauge_id: ${inputs.gauge_id}
    condition: "'vegetation' in inputs.attribute_groups"
  
  - name: geological_characteristics
    description: Extract lithology, permeability, porosity
    action: python.ai_hydro.camels.part1_attributes.extract_geological_attributes
    params:
      watershed_gdf: ${steps.delineate_watershed.output}
    condition: "'geology' in inputs.attribute_groups"
  
  - name: hydrological_signatures
    description: Compute flow statistics, timing, event characteristics
    action: python.ai_hydro.camels.part1_attributes.extract_hydrological_signatures
    params:
      gauge_id: ${inputs.gauge_id}
      watershed_gdf: ${steps.delineate_watershed.output}
      start_date: ${inputs.start_date}
      end_date: ${inputs.end_date}
    condition: "'hydrology' in inputs.attribute_groups"
  
  - name: integrate_attributes
    description: Combine all attribute groups into single dataset
    action: python.ai_hydro.camels.part1_attributes.integrate_all_attributes
    params:
      gauge_id: ${inputs.gauge_id}
      topo_attrs: ${steps.topographic_attributes.output}
      climate_attrs: ${steps.climate_indices.output}
      soil_attrs: ${steps.soil_characteristics.output}
      veg_attrs: ${steps.vegetation_characteristics.output}
      geol_attrs: ${steps.geological_characteristics.output}
      hydro_attrs: ${steps.hydrological_signatures.output}
  
  - name: export_results
    description: Save attributes in multiple formats
    action: export_camels_dataset
    params:
      output_dir: ./camels_attributes/${inputs.gauge_id}
      formats: ["csv", "json", "geojson"]

dependencies:
  python:
    - pygeohydro>=0.16.0
    - pynhd>=0.16.0
    - py3dep>=0.15.0
    - pygridmet>=0.15.0
    - geopandas>=0.13.0
    - rasterio>=1.3.0
    - xarray>=2023.0.0
    - pygeoglim>=0.1.0

example_usage: |
  # Compute all CAMELS attributes for a watershed
  gauge_id: "01031500"
  start_date: "2000-01-01"
  end_date: "2020-12-31"
  attribute_groups: ["topography", "climate", "soil", "vegetation", "geology", "hydrology"]

references:
  - "Newman et al. (2015) - CAMELS dataset"
  - "Addor et al. (2017) - CAMELS attributes"
  - "Galib & Merwade (2024) - CAMELS tutorial"
