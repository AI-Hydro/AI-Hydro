name: Fetch Hydrological Data
type: workflow
description: Download streamflow, watershed boundaries, and meteorological data from USGS and other sources
category: data_acquisition
version: 1.0.0

ai_guidance: |
  This is a FLEXIBLE WORKFLOW BLUEPRINT (not a hardcoded tool). Use this to guide the AI in implementing
  a custom data fetching pipeline when:
  - User needs specific data sources or formats
  - User wants to customize data filtering or processing
  - User needs to integrate with non-standard data sources
  - User wants to understand the data fetching process step-by-step
  
  If user just needs standard USGS data without customization, consider recommending the hardcoded
  'fetch_hydrological_data' TOOL from tier3_tools.json instead.

use_when:
  - User needs custom data filtering or processing
  - User wants to fetch from specific/non-standard sources
  - User needs to modify data retrieval logic
  - User wants flexibility in data pipeline
  - User is learning and needs step-by-step guidance

inputs:
  - name: gauge_id
    type: string
    description: USGS gauge identifier (e.g., '01031500')
    required: true
  - name: start_date
    type: date
    description: Start date for data retrieval (YYYY-MM-DD)
    required: true
  - name: end_date
    type: date
    description: End date for data retrieval (YYYY-MM-DD)
    required: true
  - name: data_types
    type: array
    description: Types of data to fetch
    default: ["streamflow", "watershed_boundary", "precipitation"]
    options:
      - streamflow
      - watershed_boundary
      - precipitation
      - temperature
      - pet

outputs:
  - name: streamflow_data
    type: dataframe
    description: Daily streamflow time series
  - name: watershed_boundary
    type: geodataframe
    description: Watershed boundary shapefile
  - name: climate_data
    type: dataframe
    description: Daily climate forcing data

steps:
  - name: validate_inputs
    description: Validate gauge ID and date range
    action: validate_gauge_id
    
  - name: delineate_watershed
    description: Delineate watershed boundary using NLDI
    action: python.ai_hydro.workflows.fetch_data.delineate_watershed
    params:
      gauge_id: ${inputs.gauge_id}
    
  - name: fetch_streamflow
    description: Download streamflow data from USGS NWIS
    action: python.ai_hydro.workflows.fetch_data.fetch_streamflow
    params:
      gauge_id: ${inputs.gauge_id}
      start_date: ${inputs.start_date}
      end_date: ${inputs.end_date}
    
  - name: fetch_climate
    description: Download climate forcing from GridMET
    action: python.ai_hydro.workflows.fetch_data.fetch_climate
    params:
      watershed_geom: ${steps.delineate_watershed.output}
      start_date: ${inputs.start_date}
      end_date: ${inputs.end_date}
    
  - name: save_outputs
    description: Save all data to output directory
    action: save_to_directory
    params:
      output_dir: ./hydro_data/${inputs.gauge_id}

dependencies:
  python:
    - pygeohydro>=0.16.0
    - pynhd>=0.16.0
    - pygridmet>=0.15.0
    - pandas>=2.0.0
    - geopandas>=0.13.0

example_usage: |
  # Fetch data for Wabash River at Lafayette, IN
  gauge_id: "03335000"
  start_date: "2010-01-01"
  end_date: "2020-12-31"
  data_types: ["streamflow", "watershed_boundary", "precipitation", "temperature"]

references:
  - USGS NWIS: https://waterdata.usgs.gov/nwis
  - GridMET: https://www.climatologylab.org/gridmet.html
  - NLDI: https://labs.waterdata.usgs.gov/about-nldi/
