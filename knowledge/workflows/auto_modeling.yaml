name: Auto Modeling
type: workflow
description: Automated hydrological model setup, calibration, and evaluation for SWAT and other models
category: modeling
version: 1.0.0

ai_guidance: |
  This is a FLEXIBLE WORKFLOW BLUEPRINT (not a hardcoded tool). Use this to guide the AI in implementing
  a custom modeling workflow when:
  - User needs specific calibration algorithms
  - User wants to customize model setup
  - User needs non-standard objective functions
  - User wants to understand the modeling process step-by-step
  
  If user needs standard automated modeling without modifications, consider recommending the hardcoded
  'auto_modeling' TOOL from tier3_tools.json instead.

use_when:
  - User needs custom calibration algorithms
  - User wants to modify model configuration
  - User needs specific performance metrics
  - User wants flexibility in modeling workflow
  - User is learning hydrological modeling

inputs:
  - name: gauge_id
    type: string
    description: USGS gauge identifier
    required: true
  - name: model_type
    type: string
    description: Hydrological model to use
    default: "SWAT"
    options:
      - SWAT
      - HEC-HMS
      - GR4J
      - lumped_conceptual
  - name: calibration_period
    type: object
    description: Calibration period dates
    required: true
    properties:
      start: "2000-01-01"
      end: "2010-12-31"
  - name: validation_period
    type: object
    description: Validation period dates
    required: true
    properties:
      start: "2011-01-01"
      end: "2015-12-31"
  - name: objective_function
    type: string
    description: Objective function for calibration
    default: "NSE"
    options:
      - NSE
      - KGE
      - RMSE
      - multi-objective

outputs:
  - name: calibrated_model
    type: object
    description: Calibrated model instance with parameters
  - name: performance_metrics
    type: dict
    description: Calibration and validation performance metrics
  - name: simulated_streamflow
    type: dataframe
    description: Simulated streamflow time series
  - name: parameter_set
    type: dict
    description: Optimized parameter values

steps:
  - name: fetch_input_data
    description: Download forcing data, watershed boundary, and observations
    action: python.ai_hydro.workflows.modeling.fetch_model_inputs
    params:
      gauge_id: ${inputs.gauge_id}
      start_date: ${inputs.calibration_period.start}
      end_date: ${inputs.validation_period.end}
  
  - name: setup_model
    description: Configure model structure and input files
    action: python.ai_hydro.workflows.modeling.setup_model
    params:
      model_type: ${inputs.model_type}
      watershed: ${steps.fetch_input_data.watershed}
      forcing_data: ${steps.fetch_input_data.forcing}
  
  - name: parameter_initialization
    description: Initialize parameters using prior distributions or CAMELS
    action: python.ai_hydro.workflows.modeling.initialize_parameters
    params:
      model_type: ${inputs.model_type}
      gauge_id: ${inputs.gauge_id}
  
  - name: calibration
    description: Calibrate model using optimization algorithm
    action: python.ai_hydro.workflows.modeling.calibrate_model
    params:
      model: ${steps.setup_model.output}
      observed_data: ${steps.fetch_input_data.streamflow}
      calibration_period: ${inputs.calibration_period}
      objective_function: ${inputs.objective_function}
      algorithm: "SPOTPY-SCE"
  
  - name: validation
    description: Validate calibrated model on independent period
    action: python.ai_hydro.workflows.modeling.validate_model
    params:
      model: ${steps.calibration.calibrated_model}
      observed_data: ${steps.fetch_input_data.streamflow}
      validation_period: ${inputs.validation_period}
  
  - name: performance_evaluation
    description: Compute comprehensive performance metrics
    action: python.ai_hydro.workflows.modeling.evaluate_performance
    params:
      simulated: ${steps.validation.simulated}
      observed: ${steps.fetch_input_data.streamflow}
      metrics: ["NSE", "KGE", "RMSE", "PBIAS", "R2"]
  
  - name: generate_report
    description: Create model performance report with plots
    action: generate_modeling_report
    params:
      model_type: ${inputs.model_type}
      gauge_id: ${inputs.gauge_id}
      calibration_metrics: ${steps.calibration.metrics}
      validation_metrics: ${steps.validation.metrics}
      parameters: ${steps.calibration.parameters}

dependencies:
  python:
    - pyswat>=0.3.0
    - spotpy>=1.6.0
    - hydroeval>=0.1.0
    - pygeohydro>=0.16.0
    - pandas>=2.0.0
    - numpy>=1.24.0
    - matplotlib>=3.7.0

example_usage: |
  # Auto-calibrate SWAT model for watershed
  gauge_id: "03335000"
  model_type: "SWAT"
  calibration_period:
    start: "2000-01-01"
    end: "2010-12-31"
  validation_period:
    start: "2011-01-01"
    end: "2015-12-31"
  objective_function: "NSE"

references:
  - "Arnold et al. (1998) - SWAT model"
  - "Duan et al. (1992) - SCE-UA algorithm"
  - "Gupta et al. (2009) - KGE metric"
